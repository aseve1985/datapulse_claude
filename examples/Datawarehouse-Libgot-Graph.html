// ── Colors ────────────────────────────────────────────────────────────────────
const COLOR_MAP = {
  'moc': '#f1f5f9',
  'analitica': '#a78bfa',
  'ARG_transaccional': '#3b82f6', 'ARG_operacional': '#60a5fa', 'ARG_financiero': '#93c5fd',
  'ARG_riesgo': '#bfdbfe', 'ARG_staging': '#6b7280',
  'COL_transaccional': '#f59e0b', 'COL_operacional': '#fbbf24', 'COL_financiero': '#fcd34d',
  'COL_riesgo': '#fde68a',
  'multipais_staging': '#6b7280', 'multipais_soporte': '#34d399',
  'multipais_operacional': '#34d399', 'multipais_analitica': '#a78bfa',
};

function schemaColor(d) {
  if (!d) return '#94a3b8';
  if (d.id === 'Datawarehouse-Libgot' || d.pais === 'moc') return '#e2e8f0';
  if (d.capa === 'analitica') return '#c4b5fd';
  if (d.capa === 'staging') return '#94a3b8';
  if (d.pais === 'ARG') return '#93c5fd';
  if (d.pais === 'COL') return '#fde68a';
  return '#86efac';
}

function schemaR(d) {
  if (d.id === 'Datawarehouse-Libgot') return 32;
  return Math.max(12, Math.min(34, 7 + Math.sqrt(d.tables) * 2.2));
}

// ── Build nodes ───────────────────────────────────────────────────────────────
const schemaMap = {};
SCHEMAS.forEach(s => schemaMap[s.id] = s);

const ALL_NODES   = SCHEMAS.map(s => ({...s, tipo:'schema'}));
const TABLE_EDGES = [];
const SCHEMA_EDGES = EDGES_RAW.map(([a,b]) => ({source:a, target:b, tipo:'ss'}));
const MOC_EDGES    = SCHEMAS.filter(s => s.id !== 'Datawarehouse-Libgot')
                            .map(s => ({source:'Datawarehouse-Libgot', target:s.id, tipo:'moc'}));

// Table nodes with real names
const tableNodesBySchema = {};
for (const schema of SCHEMAS) {
  if (schema.id === 'Datawarehouse-Libgot') continue;
  const names = TABLE_NAMES[schema.id] || [];
  tableNodesBySchema[schema.id] = [];
  names.forEach(tname => {
    const tn = {
      id: `${schema.id}.${tname}`,
      name: tname,
      fullname: `${schema.id}.${tname}`,
      tipo: 'tabla',
      schema: schema.id,
      tables: 0,
      pais: schema.pais,
      capa: schema.capa
    };
    ALL_NODES.push(tn);
    tableNodesBySchema[schema.id].push(tn);
    TABLE_EDGES.push({source: schema.id, target: tn.id, tipo: 'st'});
  });
}

// Lookup for nodes
const nodeById = {};
ALL_NODES.forEach(n => nodeById[n.id] = n);

const ALL_FORCE = [...MOC_EDGES, ...SCHEMA_EDGES, ...TABLE_EDGES];

// ── SVG + zoom ────────────────────────────────────────────────────────────────
const W = window.innerWidth, H = window.innerHeight;
const svg = d3.select('#g').attr('width', W).attr('height', H);

const defs = svg.append('defs');
['glow-moc','glow-schema','glow-hi','glow-table'].forEach((id, i) => {
  const sd = [10, 4, 12, 6][i];
  const f = defs.append('filter').attr('id', id).attr('x','-100%').attr('y','-100%').attr('width','300%').attr('height','300%');
  f.append('feGaussianBlur').attr('stdDeviation', sd).attr('result','blur');
  const m = f.append('feMerge');
  m.append('feMergeNode').attr('in','blur');
  m.append('feMergeNode').attr('in','SourceGraphic');
});

const root = svg.append('g');
let currentZoom = 1;

const zoom = d3.zoom().scaleExtent([0.04, 12])
  .on('zoom', e => {
    root.attr('transform', e.transform);
    currentZoom = e.transform.k;
    updateTableLabels();
  });
svg.call(zoom).on('dblclick.zoom', null);

// Fix MOC at center
const moc = ALL_NODES.find(n => n.id === 'Datawarehouse-Libgot');
moc.fx = W/2; moc.fy = H/2;

// ── Simulation ────────────────────────────────────────────────────────────────
const sim = d3.forceSimulation(ALL_NODES)
  .force('link', d3.forceLink(ALL_FORCE).id(d => d.id)
    .distance(l => l.tipo==='moc' ? 230 : l.tipo==='st' ? 38 : 95)
    .strength(l => l.tipo==='moc' ? 0.5 : l.tipo==='st' ? 0.85 : 0.3))
  .force('charge', d3.forceManyBody()
    .strength(d => d.tipo==='tabla' ? -14 : (d.id==='Datawarehouse-Libgot' ? -1400 : -280)))
  .force('collide', d3.forceCollide()
    .radius(d => d.tipo==='tabla' ? 6 : schemaR(d) + 10).strength(0.65))
  .force('x', d3.forceX(W/2).strength(0.014))
  .force('y', d3.forceY(H/2).strength(0.014))
  .alphaDecay(0.01).velocityDecay(0.32);

// ── Layers ────────────────────────────────────────────────────────────────────
const mocLinkL   = root.append('g');
const ssLinkL    = root.append('g');
const stLinkL    = root.append('g');
const tableL     = root.append('g');
const tableLblL  = root.append('g');  // table labels layer
const schemaL    = root.append('g');

// MOC links
const mocLinks = mocLinkL.selectAll('line').data(MOC_EDGES).enter()
  .append('line')
  .attr('stroke', d => schemaColor(schemaMap[d.target] || schemaMap[typeof d.target === 'string' ? d.target : d.target.id]))
  .attr('stroke-width', 1.2).attr('stroke-opacity', 0.32)
  .attr('stroke-dasharray', '4,6');

// Schema-schema links
const ssLinks = ssLinkL.selectAll('line').data(SCHEMA_EDGES).enter()
  .append('line')
  .attr('stroke', '#374151').attr('stroke-width', 1.5).attr('stroke-opacity', 0.48);

// Schema-table links
const stLinks = stLinkL.selectAll('line').data(TABLE_EDGES).enter()
  .append('line')
  .attr('stroke', d => schemaColor(schemaMap[typeof d.source === 'string' ? d.source : d.source.id]))
  .attr('stroke-width', 0.5).attr('stroke-opacity', 0.16);

// Table nodes
const tableNodes = tableL.selectAll('circle').data(ALL_NODES.filter(n => n.tipo === 'tabla')).enter()
  .append('circle')
  .attr('r', 3)
  .attr('fill', d => schemaColor(schemaMap[d.schema]))
  .attr('fill-opacity', 0.65)
  .attr('stroke', 'none')
  .style('cursor', 'pointer');

// Table labels (hidden until zoom > threshold)
const tableLabels = tableLblL.selectAll('text').data(ALL_NODES.filter(n => n.tipo === 'tabla')).enter()
  .append('text')
  .attr('class', 'table-label')
  .text(d => d.name)
  .attr('fill', d => schemaColor(schemaMap[d.schema]))
  .attr('fill-opacity', 0)
  .attr('dy', '-5px')
  .style('pointer-events', 'none');

function updateTableLabels() {
  const LABEL_ZOOM = 1.8;
  if (currentZoom >= LABEL_ZOOM) {
    // Fade in suave: empieza a 1.8x, completamente visible a 3x
    const opacity = Math.min(1, (currentZoom - LABEL_ZOOM) / 1.2) * 0.9;
    tableLabels.attr('fill-opacity', opacity);
    // Font size inversamente proporcional al zoom para que no crezca demasiado
    tableLabels.style('font-size', Math.max(4, 8 / currentZoom) + 'px');
  } else {
    tableLabels.attr('fill-opacity', 0);
  }
}

// Schema nodes
const schemaG = schemaL.selectAll('g').data(ALL_NODES.filter(n => n.tipo === 'schema')).enter()
  .append('g').style('cursor', 'pointer')
  .call(d3.drag()
    .on('start', (e, d) => { d._dragged = false; if (!e.active) sim.alphaTarget(0.25).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag',  (e, d) => { d._dragged = true; d.fx = e.x; d.fy = e.y; })
    .on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0.003); if (!d._dragged) { d.fx = null; d.fy = null; } }))
  .on('dblclick', (e, d) => {
    if (d.id !== 'Datawarehouse-Libgot') { d.fx = null; d.fy = null; sim.alpha(0.15).restart(); }
  });

schemaG.append('circle')
  .attr('r', d => schemaR(d))
  .attr('fill', d => schemaColor(d))
  .attr('fill-opacity', 0.88)
  .attr('stroke', d => { const c = d3.color(schemaColor(d)); return c ? c.darker(0.6).formatHex() : '#fff'; })
  .attr('stroke-width', 2)
  .style('filter', d => d.id === 'Datawarehouse-Libgot' ? 'url(#glow-moc)' : 'url(#glow-schema)');

schemaG.each(function(d) {
  const el = d3.select(this);
  const isMoc = d.id === 'Datawarehouse-Libgot';
  const label = isMoc ? 'DWH · Libgot' : d.id.replace(/_/g, ' ');
  const words = label.split(' ');
  const sz = isMoc ? '10px' : (schemaR(d) > 22 ? '9px' : '8px');
  // Split into max 2 lines
  const mid = Math.ceil(words.length / 2);
  const lines = words.length > 2 ? [words.slice(0, mid).join(' '), words.slice(mid).join(' ')] : [label];
  lines.forEach((ln, i) => {
    el.append('text')
      .attr('dy', lines.length === 1 ? '0.35em' : (i === 0 ? '-0.2em' : '0.9em'))
      .style('font-size', sz)
      .style('font-weight', isMoc ? '800' : '600')
      .style('fill', '#1e293b')
      .style('text-anchor', 'middle')
      .style('pointer-events', 'none')
      .style('user-select', 'none')
      .style('paint-order', 'stroke')
      .style('stroke', 'rgba(255,255,255,0.4)')
      .style('stroke-width', '2px')
      .text(ln);
  });
});

// ── Tooltip ───────────────────────────────────────────────────────────────────
const tt = d3.select('#tooltip');

function showTT(e, html) {
  tt.classed('show', true).html(html);
  moveTT(e);
}
function moveTT(e) {
  const x = e.pageX + 18, y = e.pageY - 14;
  tt.style('left', Math.min(x, window.innerWidth - 280) + 'px').style('top', y + 'px');
}
function hideTT() { tt.classed('show', false); }

schemaG
  .on('mouseover', (e, d) => {
    if (focusedNode && focusedNode.id !== d.id) return;
    const col = schemaColor(d);
    const connCount = EDGES_RAW.filter(([a,b]) => a===d.id || b===d.id).length;
    showTT(e, `
      <div class="tname">${d.emoji} ${d.id}</div>
      ${d.desc ? `<div class="tdesc">${d.desc}</div>` : ''}
      <span class="badge" style="background:${col}22;color:${col};border:1px solid ${col}44">${d.capa}</span>
      <span class="badge" style="background:${col}22;color:${col};border:1px solid ${col}44">${d.pais}</span>
      ${d.tables > 0 ? `<span class="badge" style="background:#21262d;color:#8b949e;border:1px solid #30363d">${d.tables} tablas</span>` : ''}
      ${connCount > 0 ? `<span class="badge" style="background:#21262d;color:#8b949e;border:1px solid #30363d">${connCount} conexiones</span>` : ''}
    `);
  })
  .on('mousemove', (e) => moveTT(e))
  .on('mouseout',  () => hideTT())
  .on('click', (e, d) => { e.stopPropagation(); focusNode(d); });

tableNodes
  .call(d3.drag()
    .on('start', (e, d) => { d._dragged = false; if (!e.active) sim.alphaTarget(0.2).restart(); d.fx = d.x; d.fy = d.y; hideTT(); })
    .on('drag',  (e, d) => { d._dragged = true; d.fx = e.x; d.fy = e.y; })
    .on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0.003); if (!d._dragged) { d.fx = null; d.fy = null; } }))
  .on('dblclick', (e, d) => { e.stopPropagation(); d.fx = null; d.fy = null; sim.alpha(0.1).restart(); })
  .on('mouseover', (e, d) => {
    const col = schemaColor(schemaMap[d.schema]);
    showTT(e, `
      <div class="tablename">${d.fullname}</div>
      <div class="schemaref">schema: <span style="color:${col}">${d.schema}</span></div>
    `);
    d3.select(e.currentTarget).attr('r', 5).attr('fill-opacity', 1)
      .style('filter', 'url(#glow-table)');
  })
  .on('mousemove', (e) => moveTT(e))
  .on('mouseout', (e) => {
    hideTT();
    d3.select(e.currentTarget).attr('r', 3).attr('fill-opacity', 0.65)
      .style('filter', 'none');
  })
  .on('click', (e, d) => { e.stopPropagation(); focusTable(d); });

// ── Focus / Obsidian-style highlight ─────────────────────────────────────────
let focusedNode = null;

function focusNode(d) {
  // If clicking the same node, unfocus
  if (focusedNode && focusedNode.id === d.id) { resetFocus(); return; }
  focusedNode = d;

  // Build connected set — incluye edges de MOC y schema-schema
  const directConn = new Set([d.id]);
  SCHEMA_EDGES.forEach(e => {
    const sid = typeof e.source === 'string' ? e.source : e.source.id;
    const tid = typeof e.target === 'string' ? e.target : e.target.id;
    if (sid === d.id) directConn.add(tid);
    if (tid === d.id) directConn.add(sid);
  });
  MOC_EDGES.forEach(e => {
    const sid = typeof e.source === 'string' ? e.source : e.source.id;
    const tid = typeof e.target === 'string' ? e.target : e.target.id;
    if (sid === d.id) directConn.add(tid);
    if (tid === d.id) directConn.add(sid);
  });
  // MOC siempre visible
  directConn.add('Datawarehouse-Libgot');

  // Schema nodes
  schemaG.each(function(n) {
    const isFocus  = n.id === d.id;
    const isLinked = directConn.has(n.id);
    const isMoc    = n.id === 'Datawarehouse-Libgot';
    d3.select(this).select('circle')
      .transition().duration(280)
      .attr('fill-opacity',   isFocus ? 1 : isLinked ? 0.85 : 0.06)
      .attr('stroke-opacity', isFocus ? 1 : isLinked ? 0.7  : 0.05)
      .style('filter', isFocus ? 'url(#glow-hi)' : isMoc ? 'url(#glow-moc)' : isLinked ? 'url(#glow-schema)' : 'none');
    d3.select(this).selectAll('text')
      .transition().duration(280)
      .attr('fill-opacity', isFocus ? 1 : isLinked ? 0.9 : 0.06);
  });

  // Schema-schema links
  ssLinks.transition().duration(280)
    .attr('stroke', l => {
      const sid = typeof l.source === 'string' ? l.source : l.source.id;
      const tid = typeof l.target === 'string' ? l.target : l.target.id;
      return (sid === d.id || tid === d.id) ? schemaColor(d) : '#374151';
    })
    .attr('stroke-opacity', l => {
      const sid = typeof l.source === 'string' ? l.source : l.source.id;
      const tid = typeof l.target === 'string' ? l.target : l.target.id;
      return (sid === d.id || tid === d.id) ? 0.85 : 0.04;
    })
    .attr('stroke-width', l => {
      const sid = typeof l.source === 'string' ? l.source : l.source.id;
      const tid = typeof l.target === 'string' ? l.target : l.target.id;
      return (sid === d.id || tid === d.id) ? 2.5 : 1.5;
    });

  // MOC links
  mocLinks.transition().duration(280)
    .attr('stroke-opacity', l => {
      const tid = typeof l.target === 'string' ? l.target : l.target.id;
      return tid === d.id ? 0.65 : 0.04;
    })
    .attr('stroke-width', l => {
      const tid = typeof l.target === 'string' ? l.target : l.target.id;
      return tid === d.id ? 2 : 1.2;
    });

  // Table nodes and links for focused schema
  tableNodes.transition().duration(280)
    .attr('fill-opacity', t => t.schema === d.id ? 0.9 : directConn.has(t.schema) ? 0.25 : 0.04)
    .attr('r', t => t.schema === d.id ? 4 : 3);
  stLinks.transition().duration(280)
    .attr('stroke-opacity', l => {
      const sid = typeof l.source === 'string' ? l.source : l.source.id;
      return sid === d.id ? 0.45 : 0.02;
    })
    .attr('stroke-width', l => {
      const sid = typeof l.source === 'string' ? l.source : l.source.id;
      return sid === d.id ? 1 : 0.5;
    });

  tableLabels.attr('fill-opacity', t => {
    if (currentZoom < 3.2) return 0;
    const base = Math.min(1, (currentZoom - 3.2) / 1.5) * 0.85;
    return t.schema === d.id ? base : 0;
  });

  showSidePanel(d);
  nudge(d, 3);
}

function focusTable(d) {
  focusedNode = d;
  const parentSchema = d.schema;

  schemaG.each(function(n) {
    const isParent = n.id === parentSchema;
    const isMoc = n.id === 'Datawarehouse-Libgot';
    d3.select(this).select('circle')
      .transition().duration(280)
      .attr('fill-opacity',   isParent ? 0.9 : isMoc ? 0.6 : 0.06)
      .attr('stroke-opacity', isParent ? 1   : isMoc ? 0.4 : 0.04)
      .style('filter', isParent ? 'url(#glow-schema)' : 'none');
    d3.select(this).selectAll('text')
      .transition().duration(280)
      .attr('fill-opacity', isParent ? 1 : 0.06);
  });

  tableNodes.transition().duration(280)
    .attr('fill-opacity', t => t.id === d.id ? 1 : t.schema === parentSchema ? 0.35 : 0.04)
    .attr('r', t => t.id === d.id ? 6 : t.schema === parentSchema ? 3 : 2.5)
    .style('filter', t => t.id === d.id ? 'url(#glow-table)' : 'none');

  ssLinks.transition().duration(280).attr('stroke-opacity', 0.04);
  mocLinks.transition().duration(280).attr('stroke-opacity', 0.04);
  stLinks.transition().duration(280)
    .attr('stroke-opacity', l => {
      const sid = typeof l.source === 'string' ? l.source : l.source.id;
      const tid = typeof l.target === 'string' ? l.target : l.target.id;
      return sid === parentSchema && tid === d.id ? 0.7 : sid === parentSchema ? 0.2 : 0.02;
    });

  // Highlight active row in side panel if open
  document.querySelectorAll('.sp-table-row').forEach(r => {
    r.classList.toggle('active', r.dataset.id === d.id);
  });

  // Zoom to table
  if (d.x && d.y) {
    svg.transition().duration(500).call(zoom.transform,
      d3.zoomIdentity.translate(W/2, H/2).scale(Math.max(currentZoom, 5)).translate(-d.x, -d.y));
  }
}

// ── Side Panel logic ──────────────────────────────────────────────────────────
let spCurrentSchema = null;
let spAllTables = [];

function showSidePanel(d) {
  spCurrentSchema = d;
  const col = schemaColor(d);
  const isMoc = d.id === 'Datawarehouse-Libgot';

  // Para el MOC los "hijos" son los 24 schemas; para schemas normales son sus tablas
  const items = isMoc
    ? SCHEMAS.filter(s => s.id !== 'Datawarehouse-Libgot').map(s => s.id)
    : (TABLE_NAMES[d.id] || []);
  spAllTables = items;

  // Accent bar
  document.getElementById('sp-accent').style.background = col;

  // Header
  document.getElementById('sp-name').textContent = (d.emoji ? d.emoji + ' ' : '') + d.id;
  document.getElementById('sp-desc').textContent = d.desc || '';

  // Meta badges
  const meta = document.getElementById('sp-meta');
  const countLabel = isMoc ? '24 schemas' : `${items.length} tablas`;
  meta.innerHTML = `
    <span class="sp-badge" style="background:${col}18;color:${col};border-color:${col}33">${d.pais}</span>
    <span class="sp-badge" style="background:${col}18;color:${col};border-color:${col}33">${d.capa}</span>
    <span class="sp-badge" style="background:#0d1520;color:#6e7681;border-color:#1e2d3d">${countLabel}</span>
  `;

  // Sección de conexiones (vacía para MOC, ya que conecta a todos)
  const chips = document.getElementById('sp-conn-chips');
  if (isMoc) {
    chips.innerHTML = '<span style="font-size:10px;color:#374151">Raíz del grafo — conecta a todos los schemas</span>';
  } else {
    const conns = EDGES_RAW
      .filter(([a,b]) => a===d.id || b===d.id)
      .map(([a,b]) => a===d.id ? b : a);
    chips.innerHTML = conns.map(s => {
      const sc = schemaColor(schemaMap[s]);
      return `<span class="sp-conn-chip" data-schema="${s}" style="border-color:${sc}33;color:${sc}">${s}</span>`;
    }).join('');
    chips.querySelectorAll('.sp-conn-chip').forEach(chip => {
      chip.addEventListener('click', e => {
        e.stopPropagation();
        const s = schemaMap[chip.dataset.schema];
        if (s) focusNode(s);
      });
    });
  }

  // Filter + list
  document.getElementById('sp-filter').value = '';
  document.getElementById('sp-filter').placeholder = isMoc ? 'Filtrar schemas...' : 'Filtrar tablas...';
  renderTableList(items, col, isMoc);

  document.getElementById('sp-filter').oninput = function() {
    const q = this.value.toLowerCase();
    renderTableList(q ? items.filter(t => t.includes(q)) : items, col, isMoc);
  };

  document.getElementById('side-panel').classList.add('open');
  document.getElementById('hint-base').classList.add('hidden');
}

function renderTableList(items, col, isMoc) {
  const container = document.getElementById('sp-tables');
  const label = isMoc ? 'schema' : 'tabla';
  document.getElementById('sp-count').textContent = `${items.length} ${label}${items.length !== 1 ? 's' : ''}`;

  if (isMoc) {
    // Lista de schemas — click navega al schema
    container.innerHTML = items.map((s, i) => {
      const sc = schemaMap[s];
      const sc_col = schemaColor(sc);
      return `<div class="sp-table-row" data-schema-id="${s}">
        <span class="sp-dot" style="background:${sc_col}"></span>
        <span class="sp-tname" title="${s}">${sc ? (sc.emoji ? sc.emoji + ' ' : '') + s : s}</span>
        <span class="sp-idx">${i+1}</span>
      </div>`;
    }).join('');
    container.querySelectorAll('.sp-table-row').forEach(row => {
      row.addEventListener('click', e => {
        e.stopPropagation();
        const s = schemaMap[row.dataset.schemaId];
        if (s) {
          document.querySelectorAll('.sp-table-row').forEach(r => r.classList.remove('active'));
          row.classList.add('active');
          focusNode(s);
        }
      });
    });
  } else {
    // Lista de tablas — click hace focusTable
    container.innerHTML = items.map((t, i) => {
      const fullId = `${spCurrentSchema.id}.${t}`;
      return `<div class="sp-table-row" data-id="${fullId}" data-schema="${spCurrentSchema.id}">
        <span class="sp-dot" style="background:${col}"></span>
        <span class="sp-tname" title="${fullId}">${t}</span>
        <span class="sp-idx">${i+1}</span>
      </div>`;
    }).join('');
    container.querySelectorAll('.sp-table-row').forEach(row => {
      row.addEventListener('click', e => {
        e.stopPropagation();
        const tn = nodeById[row.dataset.id];
        if (tn) {
          document.querySelectorAll('.sp-table-row').forEach(r => r.classList.remove('active'));
          row.classList.add('active');
          focusTable(tn);
        }
      });
    });
  }
}

function hideSidePanel() {
  document.getElementById('side-panel').classList.remove('open');
  document.getElementById('hint-base').classList.remove('hidden');
  spCurrentSchema = null;
}

document.getElementById('sp-close').addEventListener('click', e => {
  e.stopPropagation();
  hideSidePanel();
  resetFocus();
});

function resetFocus() {
  focusedNode = null;
  schemaG.each(function(n) {
    d3.select(this).select('circle')
      .transition().duration(300)
      .attr('fill-opacity', 0.88).attr('stroke-opacity', 1)
      .style('filter', n.id === 'Datawarehouse-Libgot' ? 'url(#glow-moc)' : 'url(#glow-schema)');
    d3.select(this).selectAll('text').transition().duration(300).attr('fill-opacity', 1);
  });
  ssLinks.transition().duration(300).attr('stroke', '#374151').attr('stroke-opacity', 0.48).attr('stroke-width', 1.5);
  mocLinks.transition().duration(300).attr('stroke-opacity', 0.32).attr('stroke-width', 1.2);
  tableNodes.transition().duration(300).attr('fill-opacity', 0.65).attr('r', 3).style('filter', 'none');
  stLinks.transition().duration(300).attr('stroke-opacity', 0.16).attr('stroke-width', 0.5);
  updateTableLabels();
  hideSidePanel();
}

svg.on('click', () => resetFocus());

// ── Nudge ─────────────────────────────────────────────────────────────────────
function nudge(schema, strength) {
  const tn = tableNodesBySchema[schema.id] || [];
  tn.forEach(t => {
    const a = Math.random() * Math.PI * 2;
    t.vx = (t.vx || 0) + Math.cos(a) * strength;
    t.vy = (t.vy || 0) + Math.sin(a) * strength;
  });
  if (tn.length) sim.alpha(Math.max(sim.alpha(), 0.1)).restart();
}

// ── Search ────────────────────────────────────────────────────────────────────
d3.select('#srch').on('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) { resetFocus(); return; }

  // Try schema match first
  const sm = SCHEMAS.find(s => s.id.toLowerCase().includes(q) && s.id !== 'Datawarehouse-Libgot');
  if (sm) {
    focusNode(sm);
    const node = ALL_NODES.find(n => n.id === sm.id);
    if (node && node.x) {
      svg.transition().duration(650).call(zoom.transform,
        d3.zoomIdentity.translate(W/2, H/2).scale(2.5).translate(-node.x, -node.y));
    }
    return;
  }

  // Try table match
  const tm = ALL_NODES.find(n => n.tipo === 'tabla' && n.name.toLowerCase().includes(q));
  if (tm) {
    focusTable(tm);
  }
});

// ── Reset button ──────────────────────────────────────────────────────────────
d3.select('#rst').on('click', () => {
  resetFocus();
  d3.select('#srch').property('value', '');
  svg.transition().duration(700).call(zoom.transform, d3.zoomIdentity);
});

// ── Tick ──────────────────────────────────────────────────────────────────────
sim.on('tick', () => {
  mocLinks.attr('x1', d => (d.source.x || W/2)).attr('y1', d => (d.source.y || H/2))
          .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  ssLinks.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
         .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  stLinks.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
         .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  tableNodes.attr('cx', d => d.x).attr('cy', d => d.y);
  tableLabels.attr('x', d => d.x).attr('y', d => d.y);
  schemaG.attr('transform', d => `translate(${d.x},${d.y})`);
});

sim.on('end', () => sim.alphaTarget(0.002).restart());

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const W2 = window.innerWidth, H2 = window.innerHeight;
  svg.attr('width', W2).attr('height', H2);
  moc.fx = W2/2; moc.fy = H2/2;
  sim.force('x', d3.forceX(W2/2).strength(0.014))
     .force('y', d3.forceY(H2/2).strength(0.014))
     .alpha(0.1).restart();
});
</script>
</body>
</html>
